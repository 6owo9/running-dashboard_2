spring:
  datasource:
    url: jdbc:h2:file:/home/seong/data/runningdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:running-dashboard-jwt-secret-key-2024-v1}
  expiration-ms: 604800000

encryption:
  key: ${ENCRYPTION_KEY:running-dashboard-default-encrypt-key!}

kakao:
  client-id: ${KAKAO_CLIENT_ID:edcbde68b1e46748153e15d358a09ea5}
  client-secret: ${KAKAO_CLIENT_SECRET:3ea8aIUDWVyPSNBHSRqeDGQ49DCn0V5b}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/auth/kakao/callback}

logging:
  level:
    com.running: DEBUG
